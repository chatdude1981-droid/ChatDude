<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatDude</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #chat-container {
      display: none;
    }

    #main-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #chat-area {
      flex: 1;
    }

    #sidebar {
      width: 250px;
      border: 1px solid #ccc;
      padding: 10px;
    }

    #messages {
      list-style: none;
      padding: 0;
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    #messages li {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
    }

    .system {
      color: #666;
      font-style: italic;
    }

    .private {
      color: #7a1fa2;
      font-style: italic;
    }

    .username {
      font-weight: bold;
    }

    form {
      display: flex;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
    }

    input {
      flex: 1;
    }

    #join-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #users {
      list-style: none;
      padding: 0;
      margin: 0 0 15px 0;
    }

    #users li {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    #users li:hover {
      background: #f5f5f5;
    }

    #pm-section {
      margin-top: 15px;
    }

    #pm-target {
      width: 100%;
      margin-bottom: 10px;
    }

    #pm-input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    #pm-button {
      width: 100%;
    }

    #room-label {
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>ChatDude</h1>

  <div id="join-section">
    <form id="join-form">
      <input id="username" placeholder="Enter your username" maxlength="20" />
      <select id="room">
        <option value="general">General</option>
        <option value="random">Random</option>
        <option value="gaming">Gaming</option>
      </select>
      <button type="submit">Join Chat</button>
    </form>
  </div>

  <div id="chat-container">
    <div id="room-label"></div>

    <div id="main-layout">
      <div id="chat-area">
        <ul id="messages"></ul>

        <form id="form">
          <input id="input" autocomplete="off" placeholder="Type a room message..." />
          <button type="submit">Send</button>
        </form>
      </div>

      <div id="sidebar">
        <h3>Online Users</h3>
        <ul id="users"></ul>

        <div id="pm-section">
          <h3>Private Message</h3>
          <select id="pm-target">
            <option value="">Select a user</option>
          </select>
          <input id="pm-input" placeholder="Type a private message..." />
          <button id="pm-button" type="button">Send Private Message</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io("https://chatdude-1091.onrender.com");

    const joinForm = document.getElementById("join-form");
    const usernameInput = document.getElementById("username");
    const roomSelect = document.getElementById("room");
    const joinSection = document.getElementById("join-section");
    const chatContainer = document.getElementById("chat-container");
    const roomLabel = document.getElementById("room-label");

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    const usersList = document.getElementById("users");
    const pmTarget = document.getElementById("pm-target");
    const pmInput = document.getElementById("pm-input");
    const pmButton = document.getElementById("pm-button");

    let currentUsername = "";
    let currentRoom = "";
    let currentSocketId = "";

    joinForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const room = roomSelect.value;

      if (!username) return;

      currentUsername = username;
      currentRoom = room;

      socket.emit("join room", { username, room });
    });

    socket.on("joined room", function (data) {
      currentSocketId = data.socketId;
      joinSection.style.display = "none";
      chatContainer.style.display = "block";
      roomLabel.textContent = `Room: ${data.room}`;
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const message = input.value.trim();
      if (!message) return;

      socket.emit("chat message", message);
      input.value = "";
    });

    pmButton.addEventListener("click", function () {
      const toSocketId = pmTarget.value;
      const message = pmInput.value.trim();

      if (!toSocketId || !message) return;

      socket.emit("private message", { toSocketId, message });
      pmInput.value = "";
    });

    socket.on("chat message", function (data) {
      const item = document.createElement("li");
      item.innerHTML = `<span class="username">${data.username}:</span> ${data.message}`;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on("system message", function (msg) {
      const item = document.createElement("li");
      item.textContent = msg;
      item.classList.add("system");
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on("private message", function (data) {
      const item = document.createElement("li");
      item.innerHTML = `<span class="username">${data.from}:</span> ${data.message}`;
      item.classList.add("private");
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on("user list", function (users) {
      usersList.innerHTML = "";
      pmTarget.innerHTML = '<option value="">Select a user</option>';

      users.forEach(function (user) {
        if (user.socketId === currentSocketId) return;

        const li = document.createElement("li");
        li.textContent = user.username;
        li.dataset.socketId = user.socketId;
        li.addEventListener("click", function () {
          pmTarget.value = user.socketId;
        });
        usersList.appendChild(li);

        const option = document.createElement("option");
        option.value = user.socketId;
        option.textContent = user.username;
        pmTarget.appendChild(option);
      });
    });
  </script>
</body>
</html>
